<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是上位者吗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght=300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #d4a843;
    --red: #e05252;
    --dim: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 噪点纹理 */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 100px;
    position: relative;
    z-index: 1;
  }

  /* ======= 封面 ======= */
  #cover { display: block; }
  #quiz { display: none; }
  #result { display: none; }

  .cover-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .cover-badge {
    border: 1px solid var(--border);
    padding: 4px 10px;
    color: var(--accent);
    border-color: var(--accent);
    font-size: 9px;
    letter-spacing: 2px;
  }

  .cover-title {
    font-size: clamp(52px, 14vw, 100px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 6px;
  }

  .cover-title .line2 {
    color: var(--accent);
    display: block;
  }

  .cover-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-top: 24px;
    margin-bottom: 56px;
  }

  .cover-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  .cover-divider::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 80px;
    height: 1px;
    background: var(--accent);
  }

  .cover-desc {
    font-size: 14px;
    line-height: 2.2;
    color: var(--muted);
    margin-bottom: 64px;
    max-width: 400px;
  }

  .cover-desc em {
    color: var(--text);
    font-style: normal;
    font-weight: 700;
  }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 18px 40px;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }

  .btn-start:hover {
    background: #e8bb55;
    transform: translateY(-2px);
  }

  .btn-arrow {
    font-size: 18px;
    transition: transform 0.2s;
  }

  .btn-start:hover .btn-arrow { transform: translateX(4px); }

  /* ======= 答题 ======= */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 56px;
  }

  .progress-bar {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .q-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .q-text {
    font-size: clamp(18px, 4.5vw, 26px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 40px;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .option {
    display: flex;
    align-items: stretch;
    gap: 0;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface);
    border: 1px solid var(--border);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: var(--accent);
    opacity: 0.08;
    transition: width 0.2s;
  }

  .option:hover::before { width: 100%; }

  .option:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .option-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    padding: 18px 16px;
    background: rgba(255,255,255,0.02);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    letter-spacing: 1px;
    flex-shrink: 0;
    min-width: 44px;
    justify-content: center;
    transition: all 0.18s;
  }

  .option-text {
    padding: 16px 20px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .option.selected {
    border-color: var(--accent);
    background: rgba(212, 168, 67, 0.1);
  }

  .option.selected .option-label {
    background: var(--accent);
    color: #0d0d0d;
    border-color: var(--accent);
  }

  /* ======= 结果 ======= */
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
  }

  .result-score-block {}

  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .result-score {
    font-size: clamp(72px, 18vw, 120px);
    font-weight: 900;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -4px;
  }

  .result-max {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    margin-top: 8px;
  }

  .result-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 40px 0;
    position: relative;
  }

  .result-divider::before {
    content: 'RESULT';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    background: var(--bg);
    padding: 0 16px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--muted);
  }

  .result-title {
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 28px;
    letter-spacing: -1px;
  }

  .result-title .accent { color: var(--accent); }

  .result-desc {
    font-size: 14px;
    line-height: 2.2;
    color: var(--muted);
    margin-bottom: 48px;
    white-space: pre-line;
    border-left: 2px solid var(--accent);
    padding-left: 20px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 56px;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
  }

  .tag:first-child {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-retry {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-retry:hover {
    border-color: var(--text);
    color: var(--text);
  }

  /* 水印 */
  .watermark {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    z-index: 10;
    text-transform: uppercase;
  }

  .watermark span { color: var(--accent); opacity: 0.5; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.4s ease forwards; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- 封面 -->
  <div id="cover">
    <div class="cover-top">
      <span>性格测试 · 限制级认知</span>
      <span class="cover-badge">Vol.02</span>
    </div>

    <div class="cover-title">
      你是
      <span class="line2">上位者</span>
      吗
    </div>
    <div class="cover-sub">三十道题 · 给你一个答案</div>

    <div class="cover-divider"></div>

    <p class="cover-desc">
      有些人天生就站在上面。<br>
      不是因为凶，不是因为强势。<br>
      是因为他们的眼神，<br>
      让人觉得<em>应该听他的</em>。<br><br>
      请诚实作答。
    </p>

    <button class="btn-start" onclick="startQuiz()">
      开始测试
      <span class="btn-arrow">→</span>
    </button>
  </div>

  <!-- 答题 -->
  <div id="quiz">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="progress-num" id="progressNum">01 / 30</div>
    </div>

    <div class="q-tag" id="qTag">QUESTION 01</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
  </div>

  <!-- 结果 -->
  <div id="result">
    <div class="result-label">YOUR SCORE</div>
    <div class="result-score" id="scoreDisplay"></div>
    <div class="result-max">/ 90 pts</div>

    <div class="result-divider"></div>

    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>

    <div class="tags" id="resultTags"></div>

    <button class="btn-retry" onclick="retry()">↩ 再测一次</button>
  </div>

</div>

<div class="watermark"><span>别欺负老农民</span> × Claude</div>

<script>
const questions = [
  { text: "你们在决定去哪里吃饭，对方一直说'都行'，你会——", options: [{ text: "继续问，直到他给个答案", score: 0 },{ text: "随便说一个，等他同意", score: 1 },{ text: "直接定好，告诉他去哪", score: 2 },{ text: "心里早想好了，走就完了", score: 3 }] },
  { text: "朋友临时爽约，你的第一反应是——", options: [{ text: "有点难过，问是不是自己做错了什么", score: 0 },{ text: "不高兴，但忍着没说", score: 1 },{ text: "跟他说，下次提前说", score: 2 },{ text: "记住了。面上不显", score: 3 }] },
  { text: "在一群人里，你通常是——", options: [{ text: "跟着大家走，随大流", score: 0 },{ text: "提意见，但不强求", score: 1 },{ text: "不说话，但最后按你说的来", score: 2 },{ text: "你说往东，没人敢往西", score: 3 }] },
  { text: "对方生气冷战，你的反应是——", options: [{ text: "马上哄，忍不住", score: 0 },{ text: "等一等，看看情况", score: 1 },{ text: "让他先冷静，你先不动", score: 2 },{ text: "你更冷。等他来找你", score: 3 }] },
  { text: "别人夸你'你真的好说话'，你心里——", options: [{ text: "谢谢，我就是想让大家舒服", score: 0 },{ text: "还好啦，其实也有底线的", score: 1 },{ text: "……是吗（内心存疑）", score: 2 },{ text: "说明他还没见过我不好说话的时候", score: 3 }] },
  { text: "计划好的事对方突然要改，你——", options: [{ text: "好的，听你的", score: 0 },{ text: "稍微抱怨，然后接受", score: 1 },{ text: "问清楚原因，再决定要不要改", score: 2 },{ text: "不改。定了就是定了", score: 3 }] },
  { text: "你更享受哪种感觉——", options: [{ text: "被人照顾，有人替你做决定", score: 0 },{ text: "互相商量，共同决定", score: 1 },{ text: "自己主导，但给对方参与感", score: 2 },{ text: "全局在掌，别人照你说的来", score: 3 }] },
  { text: "对方说'你太强势了'，你——", options: [{ text: "赶紧道歉，说自己改", score: 0 },{ text: "有点难受，想了很久", score: 1 },{ text: "心里觉得这不是缺点", score: 2 },{ text: "强势怎么了，你喜欢就行", score: 3 }] },
  { text: "你在意别人的眼光吗——", options: [{ text: "很在意，会反复想", score: 0 },{ text: "在意，但努力不表现出来", score: 1 },{ text: "选择性在意", score: 2 },{ text: "别人的眼光不影响我做决定", score: 3 }] },
  { text: "对方不听你的，你——", options: [{ text: "算了，随他", score: 0 },{ text: "再说一遍，说完不管了", score: 1 },{ text: "让他先试，等他碰壁", score: 2 },{ text: "记住了。下次不会再给这个机会", score: 3 }] },
  { text: "有人当众反驳你，你的第一反应是——", options: [{ text: "慌了，开始怀疑自己", score: 0 },{ text: "不舒服，但忍着没怼回去", score: 1 },{ text: "平静回应，但心里已经记上了", score: 2 },{ text: "当场接住，让他说不下去", score: 3 }] },
  { text: "你接受别人对你的批评吗——", options: [{ text: "很容易接受，觉得对方说的都有道理", score: 0 },{ text: "要反应一下，但最终会接受", score: 1 },{ text: "看是谁说的，再决定听不听", score: 2 },{ text: "我来评估你说的对不对，不是你来评估我", score: 3 }] },
  { text: "朋友向你求助，你的感受是——", options: [{ text: "有点不知所措，怕帮不好", score: 0 },{ text: "尽力帮，但不擅长给建议", score: 1 },{ text: "很自然地接过来，开始分析", score: 2 },{ text: "享受这种感觉，喜欢被需要且能解决", score: 3 }] },
  { text: "你设定了一个规矩，对方打破了，你会——", options: [{ text: "算了，也许是自己太严了", score: 0 },{ text: "说一下，下次别这样", score: 1 },{ text: "认真谈一次，说清楚为什么不行", score: 2 },{ text: "规矩就是规矩，没有例外", score: 3 }] },
  { text: "你和别人意见不同，你通常——", options: [{ text: "很快就妥协了，不想争", score: 0 },{ text: "说出来，但说完就放下", score: 1 },{ text: "说清楚自己为什么这么想，然后等对方回应", score: 2 },{ text: "不会无意义地争，但不会轻易退", score: 3 }] },
  { text: "你一个人走进陌生的房间，你会——", options: [{ text: "找个角落站着，等别人来跟你说话", score: 0 },{ text: "有点紧张，但会慢慢融入", score: 1 },{ text: "观察一圈，找感兴趣的人再开口", score: 2 },{ text: "进门就开始扫视，心里已经把这个场子摸了底", score: 3 }] },
  { text: "有人试图操控你的情绪，你——", options: [{ text: "很快就被带进去了", score: 0 },{ text: "意识到了，但还是有点受影响", score: 1 },{ text: "感知到了，选择不配合", score: 2 },{ text: "感知到的瞬间，已经在反操控了", score: 3 }] },
  { text: "你对'规则'的态度是——", options: [{ text: "规则就是规则，认真遵守", score: 0 },{ text: "大部分遵守，有时候灵活一下", score: 1 },{ text: "规则是给不会想的人设的，我自己有判断", score: 2 },{ text: "我不破坏规则。我制定规则", score: 3 }] },
  { text: "面对压力，你的状态是——", options: [{ text: "很容易崩，需要人陪", score: 0 },{ text: "自己扛，但扛得很吃力", score: 1 },{ text: "压力越大越冷静，有点反常", score: 2 },{ text: "压力对你来说是信号，不是负担", score: 3 }] },
  { text: "你对'依赖别人'这件事——", options: [{ text: "很自然，被人照顾是好事", score: 0 },{ text: "可以接受，但不喜欢太依赖", score: 1 },{ text: "不太会，要刻意练习才能开口", score: 2 },{ text: "不依赖任何人。自给自足", score: 3 }] },
  { text: "你喜欢被人夸吗——", options: [{ text: "很喜欢，会开心很久", score: 0 },{ text: "喜欢，但不会表现得太明显", score: 1 },{ text: "看是谁夸的，有的夸不值钱", score: 2 },{ text: "夸我没用。我自己知道自己几斤几两", score: 3 }] },
  { text: "你让步之后，心里——", options: [{ text: "觉得这样挺好，大家开心就行", score: 0 },{ text: "有一点委屈，但过了就算了", score: 1 },{ text: "记着这次，下次轮到对方让步", score: 2 },{ text: "你不随便让步。让了就是在给对方发信号", score: 3 }] },
  { text: "你对'沉默'的运用——", options: [{ text: "沉默会让你不安，你会主动打破", score: 0 },{ text: "可以接受短暂沉默，但久了会说话", score: 1 },{ text: "会用沉默给对方压力，但不是刻意的", score: 2 },{ text: "沉默是你最顺手的武器之一", score: 3 }] },
  { text: "别人对你撒娇，你——", options: [{ text: "很吃这套，马上心软", score: 0 },{ text: "会心软，但要看情况", score: 1 },{ text: "享受，但不会因为撒娇就完全妥协", score: 2 },{ text: "你清楚他在干什么，但你决定要不要给", score: 3 }] },
  { text: "你对'被喜欢'这件事的态度是——", options: [{ text: "很重要，会努力让别人喜欢你", score: 0 },{ text: "挺在意的，但不会刻意讨好", score: 1 },{ text: "有人喜欢当然好，但不是必要条件", score: 2 },{ text: "不在乎。在乎的是尊重，不是喜欢", score: 3 }] },
  { text: "你做一个决定，被身边人反对，你——", options: [{ text: "很容易动摇，开始怀疑自己", score: 0 },{ text: "会再想想，万一他们说的对", score: 1 },{ text: "听完意见，但最后还是按自己的来", score: 2 },{ text: "我已经考虑过了。你们的反对是你们的事", score: 3 }] },
  { text: "有人试图越过你的边界，你——", options: [{ text: "会忍，不想让气氛尴尬", score: 0 },{ text: "不舒服，但说不出口", score: 1 },{ text: "会说，但尽量说得委婉", score: 2 },{ text: "直接说。边界不用解释，只需要执行", score: 3 }] },
  { text: "你在关系里，更害怕——", options: [{ text: "被抛下，一个人", score: 0 },{ text: "彼此不理解，说不通", score: 1 },{ text: "失去自己，被对方同化", score: 2 },{ text: "什么都不怕。怕的话也不会让人看出来", score: 3 }] },
  { text: "你对'道歉'这件事——", options: [{ text: "很容易说对不起，哪怕不是自己的错", score: 0 },{ text: "错了会道歉，但需要冷静一下", score: 1 },{ text: "确认是自己的错才道歉，说完就过", score: 2 },{ text: "道歉不代表认输，但你不会随便说", score: 3 }] },
  { text: "如果用一句话描述你在关系里的位置——", options: [{ text: "我在跟着对方走", score: 0 },{ text: "我们在相互适应", score: 1 },{ text: "我在引导，但不明说", score: 2 },{ text: "局在我手里，对方不一定知道", score: 3 }] }
];

const results = [
  { range: [0, 24], title: "天生的乖乖", desc: "你不是上位者。你生来就是被照顾的那个。会哄人、会撒娇、会让别人觉得心软——这不是弱点，是一种很稀有的磁场。只是，上位这件事，不是你的命。", tags: ["天然s", "被照顾体质", "软到没边"] },
  { range: [25, 45], title: "摇摆型选手", desc: "你可上可下，看心情，看对象，看当天吃没吃饭。控场能力有，但懒得用。被人惯着久了会软，遇上比你更软的又会突然撑起来。双向流动，最难被定义。", tags: ["情境型", "双向奔赴", "看谁更能扛"] },
  { range: [46, 63], title: "隐藏型上位者", desc: "平时藏得很好。温和、随和、不多话。但一旦发动，没人拦得住。你的控制欲不是靠吼出来的，是靠沉默压出来的。身边的人可能都没意识到，其实一直在你的节奏里。", tags: ["静水流深", "不出手则已", "一出手就没了"] },
  { range: [64, 80], title: "标准上位者", desc: "控场是本能，不是习惯。你不需要刻意去主导，局面就会自然向你倾斜。有底线，有规则，不容侵犯。很少说狠话，但说出来的话，别人会记很久。", tags: ["天然dominant", "规则制定者", "不怒自威"] },
  { range: [81, 90], title: "你已经不是上位者了", desc: "你是规则本身。\n\n上位者还需要去主导——你不用。你站在那里，局就已经定了。这种人少见，出现一个，周围的气场都会变。不一定凶，不一定强硬，但绝对不会被任何人驾驭。", tags: ["规则本身", "天花板", "降维打击"] }
];

let currentQ = 0, totalScore = 0, answered = false;

function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progressNum').textContent = String(currentQ + 1).padStart(2,'0') + ' / 30';
  document.getElementById('qTag').textContent = 'QUESTION ' + String(currentQ + 1).padStart(2,'0');

  const qEl = document.getElementById('qText');
  qEl.style.opacity = 0;
  qEl.textContent = q.text;
  setTimeout(() => { qEl.style.transition = 'opacity 0.3s'; qEl.style.opacity = 1; }, 10);

  const opt = document.getElementById('options');
  opt.innerHTML = '';
  ['A','B','C','D'].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-label">${label}</span><span class="option-text">${q.options[i].text}</span>`;
    btn.onclick = () => pick(btn, q.options[i].score, opt);
    opt.appendChild(btn);
  });
}

function pick(btn, score, container) {
  if (answered) return;
  answered = true;
  container.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  totalScore += score;
  setTimeout(() => {
    currentQ++;
    currentQ < questions.length ? renderQuestion() : showResult();
  }, 480);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'fade-in';
  document.getElementById('scoreDisplay').textContent = totalScore;
  const r = results.find(x => totalScore >= x.range[0] && totalScore <= x.range[1]);
  document.getElementById('resultTitle').innerHTML = `<span class="accent">${r.title}</span>`;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultTags').innerHTML = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
}

function retry() {
  currentQ = 0; totalScore = 0; answered = false;
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'block';
}
</script>
